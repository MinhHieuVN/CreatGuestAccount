<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Generator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="neon-text">GARENA <span class="gold-text">VIP GEN</span></h1>
            <p class="subtitle">Hệ thống tạo tài khoản tự động - Premium Interface</p>
        </header>

        <div class="glass-card config-panel">
            <div class="input-group">
                <label>Tiền tố tên</label>
                <input type="text" id="namePrefix" value="HUSTLER">
            </div>
            <div class="input-group">
                <label>Khu vực</label>
                <select id="region">
                    <option value="VN">Việt Nam</option>
                    <option value="IND">Ấn Độ</option>
                    <option value="TH">Thái Lan</option>
                    <option value="BR">Brazil</option>
                </select>
            </div>
            <div class="input-group">
                <label>Số lượng</label>
                <input type="number" id="count" value="1" min="1" max="15">
            </div>
            <button id="genBtn" class="cyber-button">BẮT ĐẦU GEN</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Đang kết nối Server...</p>
        </div>

        <div id="actionButtons" class="hidden">
            <button id="exportBtn" class="cyber-button gold">XUẤT FILE TXT</button>
            <button id="copyAllBtn" class="cyber-button blue">COPY UID|PASS</button>
        </div>

        <div id="resultArea" class="result-grid"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
