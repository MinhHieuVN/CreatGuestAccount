<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Guest VIP</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="neon-text">GARENA <span class="gold-text">VIP GEN</span></h1>
        
        <div class="glass-card config-bar">
            <input type="text" id="prefix" value="HUSTLER" placeholder="Tên...">
            <select id="region">
                <option value="VN">Việt Nam</option>
                <option value="IND">Ấn Độ</option>
                <option value="TH">Thái Lan</option>
            </select>
            <input type="number" id="count" value="1" max="5">
            <button id="genBtn" class="cyber-btn">GEN</button>
        </div>

        <div id="loading" class="hidden">Đang xử lý logic Garena...</div>
        
        <div id="actionArea" class="hidden">
            <button id="exportBtn" class="cyber-btn gold">XUẤT TXT</button>
            <button id="copyBtn" class="cyber-btn blue">COPY UID|PASS</button>
        </div>

        <div id="results"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
